<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ 飞机大战 - 终极版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            gap: 10px;
        }
        .game-container { display: flex; gap: 10px; }
        h1 {
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #4a90d9, 0 0 20px #4a90d9;
            font-size: 24px;
            letter-spacing: 2px;
        }
        .game-area { display: flex; flex-direction: column; align-items: center; }
        .game-info {
            color: #fff;
            margin-bottom: 10px;
            font-size: 14px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .game-info span { color: #ffd700; font-weight: bold; }
        .exp-bar-container, .ult-bar-container {
            width: 100px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .exp-bar-fill { height: 100%; background: linear-gradient(90deg, #4a90d9, #87ceeb); }
        .ult-bar-fill { height: 100%; background: linear-gradient(90deg, #ff6b6b, #ffd700); }
        #gameCanvas {
            border: 3px solid #4a90d9;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(74, 144, 217, 0.6);
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
        }
        .sidebar {
            width: 220px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .sidebar h2 {
            font-size: 16px;
            color: #4a90d9;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 1px solid #4a90d9;
            padding-bottom: 5px;
        }
        .stats-section { margin-bottom: 15px; }
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 12px;
        }
        .stat-name { color: #aaa; }
        .stat-value { color: #ffd700; font-weight: bold; }
        .affix-item {
            background: rgba(255,255,255,0.1);
            padding: 5px 8px;
            margin: 3px 0;
            border-radius: 4px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .affix-name { color: #ffd700; }
        .affix-level {
            background: rgba(0,0,0,0.3);
            padding: 1px 5px;
            border-radius: 8px;
            font-size: 10px;
        }
        .controls {
            color: #aaa;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }
        .controls span { color: #4a90d9; font-weight: bold; }
        #upgradePanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(20,20,40,0.98), rgba(30,30,60,0.98));
            padding: 30px;
            border-radius: 15px;
            display: none;
            z-index: 100;
            border: 2px solid #ffd700;
            box-shadow: 0 0 40px rgba(255,215,0,0.5);
            min-width: 450px;
        }
        #upgradePanel h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px #ffd700;
        }
        .upgrade-options { display: flex; flex-direction: column; gap: 10px; }
        .upgrade-option {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .upgrade-option:hover {
            background: rgba(255,255,255,0.2);
            border-color: #ffd700;
            transform: scale(1.02);
        }
        .upgrade-option .affix-name { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .upgrade-option .affix-desc { font-size: 12px; color: #aaa; }
        .upgrade-option .affix-rarity { font-size: 11px; margin-top: 5px; }
        .rarity-common { color: #aaa; }
        .rarity-rare { color: #4a90d9; }
        .rarity-epic { color: #9b59b6; }
        .rarity-legendary { color: #ffd700; }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(30,0,30,0.95));
            padding: 40px 60px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 100;
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 30px rgba(255,107,107,0.5);
        }
        #gameOver h2 { color: #ff6b6b; margin-bottom: 15px; font-size: 36px; text-shadow: 0 0 15px #ff6b6b; }
        #gameOver p { color: #fff; margin-bottom: 10px; font-size: 18px; }
        #restartBtn {
            background: linear-gradient(135deg, #4a90d9, #357abd);
            color: white; border: none; padding: 15px 40px; font-size: 20px;
            border-radius: 8px; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 0 15px rgba(74, 144, 217, 0.5); margin-top: 15px;
        }
        #restartBtn:hover { transform: scale(1.05); }
        .boss-warning {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff6b6b;
            display: none;
            z-index: 50;
            animation: bossWarning 0.5s infinite;
        }
        @keyframes bossWarning {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-area">
            <h1>✈️ 飞机大战 - 终极版</h1>
            <div class="game-info">
                <div>关卡: <span id="wave">1</span></div>
                <div>分数: <span id="score">0</span></div>
                <div>血量: <span id="hp">30</span>/<span id="maxHp">30</span></div>
                <div>等级: <span id="level">1</span></div>
                <div>经验: <span id="exp">0</span>/<span id="expNeeded">100</span></div>
                <div class="exp-bar-container"><div class="exp-bar-fill" id="expBar" style="width: 0%"></div></div>
                <div>大招: <span id="ultCharge">0</span>%</div>
                <div class="ult-bar-container"><div class="ult-bar-fill" id="ultBar" style="width: 0%"></div></div>
            </div>
            <canvas id="gameCanvas" width="450" height="650"></canvas>
            <div class="controls">
                <span>← ↑ ↓ →</span> 移动 | <span>空格</span> 发射 | <span>Z</span> 大招 | <span>P</span> 暂停 | <span>Shift</span> 加速
            </div>
        </div>

        <div class="sidebar">
            <h2>📊 属性面板</h2>
            <div class="stats-section">
                <div class="stat-item"><span class="stat-name">移动速度</span><span class="stat-value" id="stat-speed">1.0</span></div>
                <div class="stat-item"><span class="stat-name">攻击力</span><span class="stat-value" id="stat-damage">1.0</span></div>
                <div class="stat-item"><span class="stat-name">攻击速度</span><span class="stat-value" id="stat-attackSpeed">1.0</span></div>
                <div class="stat-item"><span class="stat-name">防御力</span><span class="stat-value" id="stat-defense">1.0</span></div>
            </div>

            <h2>✨ 词缀列表</h2>
            <div class="stats-section" id="affixList">
                <div class="affix-item" style="color: #666; font-style: italic;">暂无词缀</div>
            </div>

            <h2>🎯 关卡信息</h2>
            <div class="stats-section">
                <div class="stat-item"><span class="stat-name">当前波次</span><span class="stat-value" id="currentWave">1</span></div>
                <div class="stat-item"><span class="stat-name">剩余敌人</span><span class="stat-value" id="enemiesLeft">0</span></div>
                <div class="stat-item"><span class="stat-name">BOSS波次</span><span class="stat-value" id="bossWave">5</span></div>
            </div>
        </div>
    </div>

    <div class="boss-warning" id="bossWarning">⚠️ BOSS来袭 ⚠️</div>

    <div id="upgradePanel">
        <h2>🎉 升级！选择一个词缀</h2>
        <div class="upgrade-options" id="upgradeOptions"></div>
    </div>

    <div id="gameOver">
        <h2>游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <p>到达关卡: <span id="finalWave">1</span></p>
        <p>最高等级: <span id="finalLevel">1</span></p>
        <p>获得词缀: <span id="finalAffixes">0</span></p>
        <button id="restartBtn">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameRunning = true, paused = false;
        let score = 0, wave = 1, enemiesThisWave = 10, enemiesKilledThisWave = 0;
        let isBossWave = false, bossSpawned = false;

        const player = {
            x: canvas.width / 2 - 25, y: canvas.height - 90, width: 50, height: 60,
            speed: 3, damage: 1, attackSpeed: 1, defense: 1,
            level: 1, exp: 0, expNeeded: 100, hp: 30, maxHp: 30,
            ultCharge: 0, ultMax: 100, ultReady: false,
            invincible: false, invincibleTimer: 0
        };

        const affixes = [];
        const affixLevels = {};

        const affixPool = [
            { name: '速度提升', desc: '移动速度 +0.2', rarity: 'common', effect: (p) => p.speed += 0.2 },
            { name: '攻击强化', desc: '攻击力 +0.2', rarity: 'common', effect: (p) => p.damage += 0.2 },
            { name: '快速射击', desc: '攻击速度 +0.2', rarity: 'common', effect: (p) => p.attackSpeed += 0.2 },
            { name: '坚固护甲', desc: '防御力 +0.2', rarity: 'common', effect: (p) => p.defense += 0.2 },
            { name: '生命提升', desc: '最大血量 +10', rarity: 'common', effect: (p) => { p.maxHp += 10; p.hp += 10; } },
            { name: '疾风步', desc: '移动速度 +0.5', rarity: 'rare', effect: (p) => p.speed += 0.5 },
            { name: '致命打击', desc: '攻击力 +0.5', rarity: 'rare', effect: (p) => p.damage += 0.5 },
            { name: '连射', desc: '攻击速度 +0.5', rarity: 'rare', effect: (p) => p.attackSpeed += 0.5 },
            { name: '铁壁', desc: '防御力 +0.5', rarity: 'rare', effect: (p) => p.defense += 0.5 },
            { name: '多重射击', desc: '子弹数量 +1', rarity: 'rare', effect: (p) => p.multiShot = (p.multiShot || 0) + 1 },
            { name: '闪电步伐', desc: '移动速度 +1.0', rarity: 'epic', effect: (p) => p.speed += 1.0 },
            { name: '毁灭打击', desc: '攻击力 +1.0', rarity: 'epic', effect: (p) => p.damage += 1.0 },
            { name: '极速射击', desc: '攻击速度 +1.0', rarity: 'epic', effect: (p) => p.attackSpeed += 1.0 },
            { name: '不灭之躯', desc: '防御力 +1.0', rarity: 'epic', effect: (p) => p.defense += 1.0 },
            { name: '穿透', desc: '子弹穿透敌人', rarity: 'epic', effect: (p) => p.piercing = true },
            { name: '神速', desc: '移动速度 +2.0', rarity: 'legendary', effect: (p) => p.speed += 2.0 },
            { name: '神力', desc: '攻击力 +2.0', rarity: 'legendary', effect: (p) => p.damage += 2.0 },
            { name: '神射', desc: '攻击速度 +2.0', rarity: 'legendary', effect: (p) => p.attackSpeed += 2.0 },
            { name: '神盾', desc: '防御力 +2.0', rarity: 'legendary', effect: (p) => p.defense += 2.0 },
            { name: '分裂', desc: '子弹分裂成3发', rarity: 'legendary', effect: (p) => p.splitShot = true },
        ];

        let bullets = [], enemies = [], particles = [], stars = [], enemyBullets = [];
        const keys = {};

        for (let i = 0; i < 100; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 1, speed: Math.random() * 2 + 0.5, brightness: Math.random() });
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a1a'); gradient.addColorStop(0.5, '#1a1a3a'); gradient.addColorStop(1, '#0a0a2a');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
                star.brightness += (Math.random() - 0.5) * 0.1; star.brightness = Math.max(0.3, Math.min(1, star.brightness));
                star.y += star.speed; if (star.y > canvas.height) { star.y = 0; star.x = Math.random() * canvas.width; }
            });
        }

        function drawPlayer() {
            ctx.save();
            if (player.invincible) {
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 50) * 0.5;
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 30;
            } else {
                ctx.shadowColor = '#87ceeb'; ctx.shadowBlur = 20;
            }
            const gradient = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.height);
            gradient.addColorStop(0, '#6ab0ff'); gradient.addColorStop(0.5, '#4a90d9'); gradient.addColorStop(1, '#2a5a9a');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height * 0.7);
            ctx.lineTo(player.x + player.width * 0.3, player.y + player.height * 0.6);
            ctx.lineTo(player.x + player.width * 0.3, player.y + player.height);
            ctx.lineTo(player.x + player.width * 0.7, player.y + player.height);
            ctx.lineTo(player.x + player.width * 0.7, player.y + player.height * 0.6);
            ctx.lineTo(player.x + player.width, player.y + player.height * 0.7);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#357abd';
            ctx.fillRect(player.x - 8, player.y + 25, 12, 30);
            ctx.fillRect(player.x + player.width - 4, player.y + 25, 12, 30);
            ctx.restore();
        }

        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.save(); ctx.shadowColor = bullet.color; ctx.shadowBlur = 10;
                ctx.fillStyle = bullet.color; ctx.fillRect(bullet.x - 2, bullet.y, 4, bullet.height);
                ctx.restore();
            });
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.save(); ctx.shadowColor = enemy.color; ctx.shadowBlur = 15;
                const gradient = ctx.createLinearGradient(enemy.x, enemy.y, enemy.x, enemy.y + enemy.height);
                gradient.addColorStop(0, enemy.color); gradient.addColorStop(1, '#8b0000');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
                ctx.lineTo(enemy.x, enemy.y);
                ctx.lineTo(enemy.x + enemy.width * 0.3, enemy.y + enemy.height * 0.3);
                ctx.lineTo(enemy.x + enemy.width * 0.5, enemy.y + enemy.height * 0.2);
                ctx.lineTo(enemy.x + enemy.width * 0.7, enemy.y + enemy.height * 0.3);
                ctx.lineTo(enemy.x + enemy.width, enemy.y);
                ctx.closePath(); ctx.fill();
                if (enemy.isBoss) {
                    ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 3;
                    ctx.strokeRect(enemy.x - 5, enemy.y - 5, enemy.width + 10, enemy.height + 10);
                } else if (enemy.isElite) {
                    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
                    ctx.strokeRect(enemy.x - 3, enemy.y - 3, enemy.width + 6, enemy.height + 6);
                }
                ctx.restore();
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.save(); ctx.globalAlpha = p.life; ctx.shadowColor = p.color; ctx.shadowBlur = 10;
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });
        }

        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i;
                const speed = Math.random() * 5 + 3;
                particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, size: Math.random() * 5 + 2, color: color, life: 1 });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.life -= 0.02;
                return p.life > 0;
            });
        }

        function shoot() {
            const bulletCount = 1 + (player.multiShot || 0) + (player.splitShot ? 2 : 0);
            for (let i = 0; i < bulletCount; i++) {
                const offset = (i - (bulletCount - 1) / 2) * 5;
                bullets.push({
                    x: player.x + player.width / 2 - 2 + offset, y: player.y,
                    width: 4, height: 15, color: '#ffff00', vx: offset * 0.3,
                    damage: player.damage, piercing: player.piercing || false
                });
            }
        }

        function enemyShoot(enemy) {
            const bulletCount = enemy.isBoss ? 5 : enemy.isElite ? 3 : 1;
            for (let i = 0; i < bulletCount; i++) {
                const offset = (i - (bulletCount - 1) / 2) * 15;
                enemyBullets.push({
                    x: enemy.x + enemy.width / 2 - 3 + offset,
                    y: enemy.y + enemy.height,
                    width: 6, height: 12,
                    color: '#ff6b6b',
                    vx: offset * 0.1,
                    vy: enemy.isBoss ? 4 : enemy.isElite ? 5 : 6,
                    damage: enemy.damage
                });
            }
        }

        function useUlt() {
            if (player.ultCharge >= player.ultMax) {
                enemies.forEach(enemy => {
                    createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, '#ff6b6b', 30);
                    score += enemy.isBoss ? 500 : enemy.isElite ? 50 : 10;
                });
                enemies = [];
                player.ultCharge = 0;
                player.ultReady = false;
            }
        }

        function spawnEnemy() {
            const difficultyMultiplier = 1 + (wave - 1) * 0.15;
            const isBoss = isBossWave && !bossSpawned;
            const isElite = !isBoss && Math.random() < 0.15 + wave * 0.02;

            if (isBoss) {
                bossSpawned = true;
                const bossTypes = [
                    { color: '#ff0000', name: 'Red Boss' },
                    { color: '#9b59b6', name: 'Purple Boss' },
                    { color: '#00d4ff', name: 'Cyan Boss' },
                    { color: '#00ff88', name: 'Green Boss' }
                ];
                const bossType = bossTypes[Math.floor(Math.random() * bossTypes.length)];
                enemies.push({
                    x: canvas.width / 2 - 60, y: -100, width: 120, height: 100,
                    speed: 1, color: bossType.color, isBoss: true, health: 50 * difficultyMultiplier, maxHealth: 50 * difficultyMultiplier,
                    damage: 3 * difficultyMultiplier, expValue: 500, shootTimer: 30, shootInterval: 30,
                    movePattern: Math.random() > 0.5 ? 2 : -2
                });
            } else {
                const enemyTypes = [
                    { color: '#ff6b6b', width: 40, height: 45, speed: 2.5, shoot: false },
                    { color: '#ff8c42', width: 45, height: 50, speed: 2, shoot: true },
                    { color: '#ff5252', width: 35, height: 40, speed: 3, shoot: false },
                    { color: '#e74c3c', width: 50, height: 55, speed: 1.8, shoot: true },
                    { color: '#c0392b', width: 40, height: 45, speed: 2.2, shoot: false }
                ];
                const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
                const eliteTypes = [
                    { color: '#ffd700', width: 60, height: 65, speed: 1.5, shoot: true },
                    { color: '#ffaa00', width: 55, height: 60, speed: 1.8, shoot: true },
                    { color: '#ff8800', width: 65, height: 70, speed: 1.2, shoot: true }
                ];
                const eliteType = eliteTypes[Math.floor(Math.random() * eliteTypes.length)];
                
                const enemyData = isElite ? eliteType : type;
                enemies.push({
                    x: Math.random() * (canvas.width - enemyData.width), y: -50,
                    width: enemyData.width, height: enemyData.height,
                    speed: enemyData.speed * difficultyMultiplier,
                    color: enemyData.color,
                    isElite: isElite,
                    health: (isElite ? 3 : 1) * difficultyMultiplier * 2,
                    maxHealth: (isElite ? 3 : 1) * difficultyMultiplier * 2,
                    damage: (isElite ? 2 : 1) * difficultyMultiplier,
                    expValue: isElite ? 30 : 10,
                    shootTimer: enemyData.shoot ? 60 : undefined,
                    shootInterval: enemyData.shoot ? 60 : undefined,
                    movePattern: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function update() {
            if (!gameRunning || paused) return;

            const speedBoost = keys['Shift'] ? 1.5 : 1;
            const moveSpeed = player.speed * speedBoost;
            if (keys['ArrowLeft'] && player.x > 0) player.x -= moveSpeed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += moveSpeed;
            if (keys['ArrowUp'] && player.y > 0) player.y -= moveSpeed;
            if (keys['ArrowDown'] && player.y < canvas.height - player.height) player.y += moveSpeed;

            bullets = bullets.filter(bullet => {
                bullet.y += -12; bullet.x += bullet.vx || 0;
                return bullet.y > -20 && bullet.x > -20 && bullet.x < canvas.width + 20;
            });

            // 更新敌方子弹
            enemyBullets = enemyBullets.filter(bullet => {
                bullet.y += bullet.vy || 5;
                bullet.x += bullet.vx || 0;
                return bullet.y < canvas.height + 20 && bullet.x > -20 && bullet.x < canvas.width + 20;
            });

            // 更新无敌时间
            if (player.invincible) {
                player.invincibleTimer--;
                if (player.invincibleTimer <= 0) {
                    player.invincible = false;
                }
            }

            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;
                enemy.x += enemy.movePattern || 0;
                
                // 敌人射击
                if (enemy.shootTimer !== undefined) {
                    enemy.shootTimer--;
                    if (enemy.shootTimer <= 0) {
                        enemyShoot(enemy);
                        enemy.shootTimer = enemy.shootInterval || 60;
                    }
                }
                
                return enemy.y < canvas.height + 50;
            });

            // 子弹击中敌机检测
            bullets = bullets.filter(bullet => {
                let hit = false;
                for (let i = 0; i < enemies.length; i++) {
                    const enemy = enemies[i];
                    if (bullet.x < enemy.x + enemy.width && bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.height && bullet.y + bullet.height > enemy.y) {
                        hit = true;
                        enemy.health -= bullet.damage;
                        if (enemy.health <= 0) {
                            createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color, enemy.isBoss ? 50 : 20);
                            score += enemy.isBoss ? 500 : enemy.isElite ? 50 : 10;
                            player.ultCharge = Math.min(player.ultMax, player.ultCharge + (enemy.isBoss ? 50 : enemy.isElite ? 10 : 5));
                            gainExp(enemy.expValue);
                            enemiesKilledThisWave++;
                            enemies.splice(i, 1);
                        }
                        break;
                    }
                }
                return !hit || bullet.piercing;
            });

            // 敌机撞到玩家检测
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if (!player.invincible && enemy.x < player.x + player.width && enemy.x + enemy.width > player.x &&
                    enemy.y < player.y + player.height && enemy.y + enemy.height > player.y) {
                    const damage = Math.max(1, Math.ceil(enemy.damage * (1 - player.defense * 0.05)));
                    player.hp -= damage;
                    player.invincible = true;
                    player.invincibleTimer = 60;
                    if (player.hp <= 0) {
                        gameOver();
                        break;
                    }
                }
            }

            // 敌方子弹击中玩家检测
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const bullet = enemyBullets[i];
                if (!player.invincible && bullet.x < player.x + player.width && bullet.x + bullet.width > player.x &&
                    bullet.y < player.y + player.height && bullet.y + bullet.height > player.y) {
                    const damage = Math.max(1, Math.ceil(bullet.damage * (1 - player.defense * 0.05)));
                    player.hp -= damage;
                    player.invincible = true;
                    player.invincibleTimer = 60;
                    enemyBullets.splice(i, 1);
                    if (player.hp <= 0) {
                        gameOver();
                        break;
                    }
                }
            }

            if (enemiesKilledThisWave >= enemiesThisWave) nextWave();

            updateParticles();
            updateUI();
        }

        function gainExp(amount) {
            player.exp += amount;
            while (player.exp >= player.expNeeded) {
                player.exp -= player.expNeeded;
                player.level++;
                player.expNeeded = Math.floor(player.expNeeded * 1.5);
                player.maxHp += 5;
                player.hp = Math.min(player.hp + 5, player.maxHp);
                showUpgradePanel();
            }
        }

        function nextWave() {
            wave++;
            isBossWave = wave % 5 === 0;
            bossSpawned = false;
            enemiesThisWave = isBossWave ? 1 : 10 + wave * 2;
            enemiesKilledThisWave = 0;
            if (isBossWave) {
                document.getElementById('bossWarning').style.display = 'block';
                setTimeout(() => { document.getElementById('bossWarning').style.display = 'none'; }, 2000);
            }
        }

        function showUpgradePanel() {
            paused = true;
            const panel = document.getElementById('upgradePanel');
            const optionsDiv = document.getElementById('upgradeOptions');
            optionsDiv.innerHTML = '';

            const options = [];
            for (let i = 0; i < 3; i++) {
                const rarityRoll = Math.random();
                let rarity = rarityRoll < 0.5 ? 'common' : rarityRoll < 0.8 ? 'rare' : rarityRoll < 0.95 ? 'epic' : 'legendary';
                const pool = affixPool.filter(a => a.rarity === rarity);
                options.push(pool[Math.floor(Math.random() * pool.length)]);
            }

            options.forEach(affix => {
                const div = document.createElement('div');
                div.className = 'upgrade-option';
                div.innerHTML = `
                    <div class="affix-name rarity-${affix.rarity}">${affix.name}</div>
                    <div class="affix-desc">${affix.desc}</div>
                    <div class="affix-rarity rarity-${affix.rarity}">${affix.rarity.toUpperCase()}</div>
                `;
                div.onclick = () => selectUpgrade(affix);
                optionsDiv.appendChild(div);
            });

            panel.style.display = 'block';
        }

        function selectUpgrade(affix) {
            const key = affix.name;
            affixLevels[key] = (affixLevels[key] || 0) + 1;
            affix.effect(player);
            affixes.push({ ...affix, level: affixLevels[key] });
            updateAffixList();
            document.getElementById('upgradePanel').style.display = 'none';
            paused = false;
        }

        function updateAffixList() {
            const list = document.getElementById('affixList');
            if (affixes.length === 0) {
                list.innerHTML = '<div class="affix-item" style="color: #666; font-style: italic;">暂无词缀</div>';
                return;
            }
            list.innerHTML = affixes.map(a => `
                <div class="affix-item">
                    <span class="affix-name rarity-${a.rarity}">${a.name}</span>
                    <span class="affix-level">Lv.${a.level}</span>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('wave').textContent = wave;
            document.getElementById('currentWave').textContent = wave;
            document.getElementById('score').textContent = score;
            document.getElementById('hp').textContent = player.hp;
            document.getElementById('maxHp').textContent = player.maxHp;
            document.getElementById('level').textContent = player.level;
            document.getElementById('exp').textContent = player.exp;
            document.getElementById('expNeeded').textContent = player.expNeeded;
            document.getElementById('enemiesLeft').textContent = enemiesThisWave - enemiesKilledThisWave;
            document.getElementById('bossWave').textContent = Math.ceil(wave / 5) * 5;

            const expPercent = (player.exp / player.expNeeded) * 100;
            document.getElementById('expBar').style.width = expPercent + '%';

            const ultPercent = (player.ultCharge / player.ultMax) * 100;
            document.getElementById('ultBar').style.width = ultPercent + '%';
            document.getElementById('ultCharge').textContent = Math.floor(ultPercent);

            document.getElementById('stat-speed').textContent = player.speed.toFixed(1);
            document.getElementById('stat-damage').textContent = player.damage.toFixed(1);
            document.getElementById('stat-attackSpeed').textContent = player.attackSpeed.toFixed(1);
            document.getElementById('stat-defense').textContent = player.defense.toFixed(1);
        }

        function draw() {
            drawBackground();
            drawParticles();
            drawEnemies();
            drawBullets();
            drawEnemyBullets();
            drawPlayer();
        }

        function drawEnemyBullets() {
            enemyBullets.forEach(bullet => {
                ctx.save();
                ctx.shadowColor = bullet.color;
                ctx.shadowBlur = 10;
                ctx.fillStyle = bullet.color;
                ctx.fillRect(bullet.x - 2, bullet.y, 4, bullet.height);
                ctx.restore();
            });
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalWave').textContent = wave;
            document.getElementById('finalLevel').textContent = player.level;
            document.getElementById('finalAffixes').textContent = affixes.length;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restart() {
            score = 0; wave = 1; enemiesThisWave = 10; enemiesKilledThisWave = 0;
            isBossWave = false; bossSpawned = false;
            player.x = canvas.width / 2 - 25;
            player.speed = 3; player.damage = 1; player.attackSpeed = 1; player.defense = 1;
            player.level = 1; player.exp = 0; player.expNeeded = 100;
            player.hp = 30; player.maxHp = 30; player.ultCharge = 0; player.ultReady = false;
            player.invincible = false; player.invincibleTimer = 0;
            player.multiShot = 0; player.piercing = false; player.splitShot = false;
            affixes.length = 0; for (let k in affixLevels) delete affixLevels[k];
            bullets = []; enemies = []; particles = []; enemyBullets = [];
            updateAffixList();
            document.getElementById('gameOver').style.display = 'none';
            gameRunning = true; paused = false;
        }

        let lastEnemySpawn = 0, lastShot = 0;
        function gameLoop(timestamp) {
            const spawnInterval = Math.max(200, isBossWave ? 1000 : 800 - wave * 20);
            if (timestamp - lastEnemySpawn > spawnInterval && enemies.length < (isBossWave ? 1 : 20)) {
                spawnEnemy(); lastEnemySpawn = timestamp;
            }

            const shootInterval = Math.max(40, 200 - player.attackSpeed * 30);
            if (keys[' '] && timestamp - lastShot > shootInterval) {
                shoot(); lastShot = timestamp;
            }

            update(); draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
            if (e.key === 'p' || e.key === 'P') paused = !paused;
            if (e.key === 'z' || e.key === 'Z') useUlt();
        });

        document.addEventListener('keyup', (e) => { keys[e.key] = false; });
        document.getElementById('restartBtn').addEventListener('click', restart);
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
