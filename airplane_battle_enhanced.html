<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ 飞机大战 - 炫酷版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #4a90d9, 0 0 20px #4a90d9, 0 0 30px #4a90d9;
            font-size: 32px;
            letter-spacing: 3px;
        }

        .game-info {
            color: #fff;
            margin-bottom: 10px;
            font-size: 18px;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .game-info span {
            color: #ffd700;
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid #4a90d9;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(74, 144, 217, 0.6), inset 0 0 50px rgba(0,0,0,0.5);
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
        }

        .controls {
            color: #aaa;
            margin-top: 15px;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        .controls span {
            color: #4a90d9;
            font-weight: bold;
            text-shadow: 0 0 10px #4a90d9;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(30,0,30,0.95));
            padding: 40px 60px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 100;
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 30px rgba(255,107,107,0.5);
        }

        #gameOver h2 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 36px;
            text-shadow: 0 0 15px #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #gameOver p {
            color: #fff;
            margin-bottom: 20px;
            font-size: 22px;
        }

        #restartBtn {
            background: linear-gradient(135deg, #4a90d9, #357abd);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(74, 144, 217, 0.5);
        }

        #restartBtn:hover {
            background: linear-gradient(135deg, #5aa0e9, #4a90d9);
            box-shadow: 0 0 25px rgba(74, 144, 217, 0.8);
            transform: scale(1.05);
        }

        .powerup-indicator {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 16px;
            text-shadow: 0 0 10px #ffd700;
            display: none;
        }
    </style>
</head>
<body>
    <h1>✈️ 飞机大战 - 炫酷版</h1>
    <div class="game-info">
        分数: <span id="score">0</span> | 生命: <span id="lives">3</span> | 连击: <span id="combo">0</span>
    </div>
    <div class="powerup-indicator" id="powerupIndicator">🔥 双倍火力激活!</div>
    <canvas id="gameCanvas" width="450" height="650"></canvas>
    <div class="controls">
        <span>← →</span> 移动 | <span>空格</span> 发射 | <span>P</span> 暂停 | <span>Shift</span> 加速
    </div>

    <div id="gameOver">
        <h2>游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <p>最高连击: <span id="maxCombo">0</span></p>
        <button id="restartBtn">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const comboEl = document.getElementById('combo');
        const powerupIndicator = document.getElementById('powerupIndicator');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const maxComboEl = document.getElementById('maxCombo');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏状态
        let gameRunning = true;
        let score = 0;
        let lives = 3;
        let combo = 0;
        let maxCombo = 0;
        let paused = false;

        // 玩家飞机
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 90,
            width: 50,
            height: 60,
            speed: 7,
            color: '#4a90d9',
            glowColor: '#87ceeb',
            doubleFire: false,
            doubleFireTimer: 0
        };

        // 子弹数组
        let bullets = [];

        // 敌机数组
        let enemies = [];

        // 粒子效果
        let particles = [];

        // 背景星星
        let stars = [];

        // 键盘状态
        const keys = {};

        // 初始化背景星星
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 2 + 0.5,
                brightness: Math.random()
            });
        }

        // 绘制背景
        function drawBackground() {
            // 渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#1a1a3a');
            gradient.addColorStop(1, '#0a0a2a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制星星
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();

                // 星星闪烁效果
                star.brightness += (Math.random() - 0.5) * 0.1;
                star.brightness = Math.max(0.3, Math.min(1, star.brightness));

                // 星星下落
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        // 绘制玩家飞机
        function drawPlayer() {
            ctx.save();

            // 飞机发光效果
            ctx.shadowColor = player.glowColor;
            ctx.shadowBlur = 20;

            // 机身主体
            const gradient = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.height);
            gradient.addColorStop(0, '#6ab0ff');
            gradient.addColorStop(0.5, player.color);
            gradient.addColorStop(1, '#2a5a9a');
            ctx.fillStyle = gradient;

            // 飞机形状
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height * 0.7);
            ctx.lineTo(player.x + player.width * 0.3, player.y + player.height * 0.6);
            ctx.lineTo(player.x + player.width * 0.3, player.y + player.height);
            ctx.lineTo(player.x + player.width * 0.7, player.y + player.height);
            ctx.lineTo(player.x + player.width * 0.7, player.y + player.height * 0.6);
            ctx.lineTo(player.x + player.width, player.y + player.height * 0.7);
            ctx.closePath();
            ctx.fill();

            // 机翼
            ctx.fillStyle = '#357abd';
            ctx.fillRect(player.x - 8, player.y + 25, 12, 30);
            ctx.fillRect(player.x + player.width - 4, player.y + 25, 12, 30);

            // 驾驶舱
            const cockpitGradient = ctx.createRadialGradient(
                player.x + player.width / 2, player.y + 20, 0,
                player.x + player.width / 2, player.y + 20, 12
            );
            cockpitGradient.addColorStop(0, '#87ceeb');
            cockpitGradient.addColorStop(0.5, '#5a9fc4');
            cockpitGradient.addColorStop(1, '#3a7fa4');
            ctx.fillStyle = cockpitGradient;
            ctx.beginPath();
            ctx.arc(player.x + player.width / 2, player.y + 20, 10, 0, Math.PI * 2);
            ctx.fill();

            // 引擎火焰
            if (Math.random() > 0.3) {
                ctx.fillStyle = '#ff6b35';
                ctx.shadowColor = '#ff6b35';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.moveTo(player.x + player.width * 0.3, player.y + player.height);
                ctx.lineTo(player.x + player.width / 2, player.y + player.height + Math.random() * 15 + 10);
                ctx.lineTo(player.x + player.width * 0.7, player.y + player.height);
                ctx.closePath();
                ctx.fill();
            }

            // 双倍火力指示
            if (player.doubleFire) {
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 10;
                ctx.strokeRect(player.x - 5, player.y - 5, player.width + 10, player.height + 10);
            }

            ctx.restore();
        }

        // 绘制子弹
        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.save();
                ctx.shadowColor = bullet.color;
                ctx.shadowBlur = 10;

                // 子弹主体
                const gradient = ctx.createLinearGradient(bullet.x, bullet.y, bullet.x, bullet.y + bullet.height);
                gradient.addColorStop(0, '#ffff00');
                gradient.addColorStop(1, '#ff8800');
                ctx.fillStyle = gradient;
                ctx.fillRect(bullet.x - 2, bullet.y, 4, bullet.height);

                // 子弹光晕
                ctx.fillStyle = 'rgba(255, 255, 200, 0.5)';
                ctx.fillRect(bullet.x - 4, bullet.y - 2, 8, 4);

                ctx.restore();
            });
        }

        // 绘制敌机
        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.save();
                ctx.shadowColor = enemy.color;
                ctx.shadowBlur = 15;

                // 敌机主体
                const gradient = ctx.createLinearGradient(enemy.x, enemy.y, enemy.x, enemy.y + enemy.height);
                gradient.addColorStop(0, enemy.color);
                gradient.addColorStop(1, '#8b0000');
                ctx.fillStyle = gradient;

                // 敌机形状
                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
                ctx.lineTo(enemy.x, enemy.y);
                ctx.lineTo(enemy.x + enemy.width * 0.3, enemy.y + enemy.height * 0.3);
                ctx.lineTo(enemy.x + enemy.width * 0.5, enemy.y + enemy.height * 0.2);
                ctx.lineTo(enemy.x + enemy.width * 0.7, enemy.y + enemy.height * 0.3);
                ctx.lineTo(enemy.x + enemy.width, enemy.y);
                ctx.closePath();
                ctx.fill();

                // 敌机驾驶舱
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(enemy.x + enemy.width / 2, enemy.y + 15, 6, 0, Math.PI * 2);
                ctx.fill();

                // 敌机类型指示（精英敌机）
                if (enemy.isElite) {
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(enemy.x - 3, enemy.y - 3, enemy.width + 6, enemy.height + 6);
                }

                ctx.restore();
            });
        }

        // 绘制粒子效果
        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        // 创建爆炸粒子
        function createExplosion(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i;
                const speed = Math.random() * 5 + 3;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 6 + 2,
                    color: color,
                    life: 1
                });
            }
        }

        // 创建火花效果
        function createSparks(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: Math.random() * 3 + 1,
                    color: color,
                    life: 0.8
                });
            }
        }

        // 更新粒子
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.98;
                p.vy *= 0.98;
                p.life -= 0.02;
                return p.life > 0;
            });
        }

        // 发射子弹
        function shoot() {
            if (player.doubleFire) {
                bullets.push({
                    x: player.x + player.width * 0.25,
                    y: player.y,
                    width: 4,
                    height: 15,
                    color: '#ffaa00'
                });
                bullets.push({
                    x: player.x + player.width * 0.75,
                    y: player.y,
                    width: 4,
                    height: 15,
                    color: '#ffaa00'
                });
            } else {
                bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y,
                    width: 4,
                    height: 15,
                    color: '#ffff00'
                });
            }
        }

        // 生成敌机
        function spawnEnemy() {
            const isElite = Math.random() < 0.15; // 15% 几率生成精英敌机
            const colors = ['#ff6b6b', '#ff8c42', '#ff5252', '#e74c3c', '#c0392b'];
            enemies.push({
                x: Math.random() * (canvas.width - 50),
                y: -50,
                width: isElite ? 50 : 40,
                height: isElite ? 55 : 45,
                speed: isElite ? 1.5 : Math.random() * 2 + 2.5,
                color: colors[Math.floor(Math.random() * colors.length)],
                isElite: isElite,
                health: isElite ? 3 : 1
            });
        }

        // 生成道具
        function spawnPowerup() {
            if (Math.random() < 0.02) { // 2% 几率生成道具
                // 暂时只实现双倍火力道具
                player.doubleFire = true;
                player.doubleFireTimer = 300; // 5秒 (60fps * 5)
                powerupIndicator.style.display = 'block';
            }
        }

        // 更新游戏
        function update() {
            if (!gameRunning || paused) return;

            // 玩家移动
            const speedBoost = keys['Shift'] ? 1.5 : 1;
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed * speedBoost;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed * speedBoost;
            }

            // 更新双倍火力
            if (player.doubleFire) {
                player.doubleFireTimer--;
                if (player.doubleFireTimer <= 0) {
                    player.doubleFire = false;
                    powerupIndicator.style.display = 'none';
                }
            }

            // 更新子弹
            bullets = bullets.filter(bullet => {
                bullet.y -= 12;
                return bullet.y > -20;
            });

            // 更新敌机
            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;
                return enemy.y < canvas.height + 50;
            });

            // 碰撞检测：子弹击中敌机
            bullets = bullets.filter(bullet => {
                let hit = false;
                enemies = enemies.filter(enemy => {
                    if (bullet.x < enemy.x + enemy.width &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y + bullet.height > enemy.y) {
                        hit = true;
                        enemy.health--;

                        if (enemy.health <= 0) {
                            createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color, enemy.isElite ? 30 : 20);
                            score += enemy.isElite ? 50 : 10;
                            combo++;
                            if (combo > maxCombo) maxCombo = combo;
                            scoreEl.textContent = score;
                            comboEl.textContent = combo;
                            return false;
                        } else {
                            createSparks(bullet.x, bullet.y, '#ffff00');
                        }
                    }
                    return true;
                });
                return !hit;
            });

            // 碰撞检测：敌机撞到玩家
            enemies = enemies.filter(enemy => {
                if (enemy.x < player.x + player.width &&
                    enemy.x + enemy.width > player.x &&
                    enemy.y < player.y + player.height &&
                    enemy.y + enemy.height > player.y) {
                    lives--;
                    livesEl.textContent = lives;
                    combo = 0;
                    comboEl.textContent = combo;
                    createExplosion(player.x + player.width / 2, player.y + player.height / 2, '#4a90d9', 25);
                    if (lives <= 0) {
                        gameOver();
                    }
                    return false;
                }
                return true;
            });

            updateParticles();
        }

        // 绘制游戏
        function draw() {
            drawBackground();
            drawParticles();
            drawEnemies();
            drawBullets();
            drawPlayer();
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            maxComboEl.textContent = maxCombo;
            gameOverEl.style.display = 'block';
        }

        // 重新开始
        function restart() {
            score = 0;
            lives = 3;
            combo = 0;
            maxCombo = 0;
            bullets = [];
            enemies = [];
            particles = [];
            player.x = canvas.width / 2 - 25;
            player.doubleFire = false;
            powerupIndicator.style.display = 'none';
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            comboEl.textContent = combo;
            gameOverEl.style.display = 'none';
            gameRunning = true;
            paused = false;
        }

        // 游戏循环
        let lastEnemySpawn = 0;
        let lastShot = 0;
        let lastPowerupSpawn = 0;

        function gameLoop(timestamp) {
            // 生成敌机
            if (timestamp - lastEnemySpawn > 600) {
                spawnEnemy();
                lastEnemySpawn = timestamp;
            }

            // 生成道具
            if (timestamp - lastPowerupSpawn > 1000) {
                spawnPowerup();
                lastPowerupSpawn = timestamp;
            }

            // 自动射击
            if (keys[' '] && timestamp - lastShot > 150) {
                shoot();
                lastShot = timestamp;
            }

            update();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // 事件监听
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.key === ' ') {
                e.preventDefault();
            }

            if (e.key === 'p' || e.key === 'P') {
                paused = !paused;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        restartBtn.addEventListener('click', restart);

        // 开始游戏
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
