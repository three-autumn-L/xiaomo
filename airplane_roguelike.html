<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ 飞机大战 - Roguelike版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            gap: 10px;
        }

        .game-container {
            display: flex;
            gap: 10px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #4a90d9, 0 0 20px #4a90d9;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-info {
            color: #fff;
            margin-bottom: 10px;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .game-info span {
            color: #ffd700;
            font-weight: bold;
        }

        .exp-bar-container {
            width: 100px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .exp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a90d9, #87ceeb);
            transition: width 0.3s;
        }

        #gameCanvas {
            border: 3px solid #4a90d9;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(74, 144, 217, 0.6), inset 0 0 50px rgba(0,0,0,0.5);
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
        }

        /* 侧边栏 */
        .sidebar {
            width: 200px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .sidebar h2 {
            font-size: 16px;
            color: #4a90d9;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 1px solid #4a90d9;
            padding-bottom: 5px;
        }

        .stats-section {
            margin-bottom: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 12px;
        }

        .stat-name {
            color: #aaa;
        }

        .stat-value {
            color: #ffd700;
            font-weight: bold;
        }

        .level-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin: 5px 0;
            overflow: hidden;
        }

        .level-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a90d9, #87ceeb);
            transition: width 0.3s;
        }

        .affixes-section {
            margin-top: 15px;
        }

        .affix-item {
            background: rgba(255,255,255,0.1);
            padding: 5px 8px;
            margin: 3px 0;
            border-radius: 4px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
        }

        .affix-name {
            color: #ffd700;
        }

        .affix-value {
            color: #87ceeb;
        }

        .controls {
            color: #aaa;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }

        .controls span {
            color: #4a90d9;
            font-weight: bold;
        }

        /* 升级选择界面 */
        #upgradePanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(20,20,40,0.98), rgba(30,30,60,0.98));
            padding: 30px;
            border-radius: 15px;
            display: none;
            z-index: 100;
            border: 2px solid #ffd700;
            box-shadow: 0 0 40px rgba(255,215,0,0.5);
            min-width: 400px;
        }

        #upgradePanel h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px #ffd700;
        }

        .upgrade-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .upgrade-option {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .upgrade-option:hover {
            background: rgba(255,255,255,0.2);
            border-color: #ffd700;
            transform: scale(1.02);
        }

        .upgrade-option .affix-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .upgrade-option .affix-desc {
            font-size: 12px;
            color: #aaa;
        }

        .upgrade-option .affix-rarity {
            font-size: 11px;
            margin-top: 5px;
        }

        .rarity-common { color: #aaa; }
        .rarity-rare { color: #4a90d9; }
        .rarity-epic { color: #9b59b6; }
        .rarity-legendary { color: #ffd700; }

        /* 游戏结束 */
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(30,0,30,0.95));
            padding: 40px 60px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 100;
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 30px rgba(255,107,107,0.5);
        }

        #gameOver h2 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 36px;
            text-shadow: 0 0 15px #ff6b6b;
        }

        #gameOver p {
            color: #fff;
            margin-bottom: 10px;
            font-size: 18px;
        }

        #restartBtn {
            background: linear-gradient(135deg, #4a90d9, #357abd);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(74, 144, 217, 0.5);
            margin-top: 15px;
        }

        #restartBtn:hover {
            background: linear-gradient(135deg, #5aa0e9, #4a90d9);
            box-shadow: 0 0 25px rgba(74, 144, 217, 0.8);
            transform: scale(1.05);
        }

        .wave-info {
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-area">
            <h1>✈️ 飞机大战 - Roguelike版</h1>
            <div class="game-info">
                <div>关卡: <span id="wave">1</span></div>
                <div>分数: <span id="score">0</span></div>
                <div>生命: <span id="lives">3</span></div>
                <div>等级: <span id="level">1</span></div>
                <div>经验: <span id="exp">0</span>/<span id="expNeeded">100</span></div>
                <div class="exp-bar-container">
                    <div class="exp-bar-fill" id="expBar" style="width: 0%"></div>
                </div>
            </div>
            <canvas id="gameCanvas" width="450" height="650"></canvas>
            <div class="controls">
                <span>← →</span> 移动 | <span>空格</span> 发射 | <span>P</span> 暂停 | <span>Shift</span> 加速
            </div>
        </div>

        <div class="sidebar">
            <h2>📊 属性面板</h2>
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-name">移动速度</span>
                    <span class="stat-value" id="stat-speed">1.0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-name">攻击力</span>
                    <span class="stat-value" id="stat-damage">1.0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-name">攻击速度</span>
                    <span class="stat-value" id="stat-attackSpeed">1.0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-name">防御力</span>
                    <span class="stat-value" id="stat-defense">1.0</span>
                </div>
            </div>

            <h2>✨ 词缀列表</h2>
            <div class="affixes-section" id="affixList">
                <div class="affix-item" style="color: #666; font-style: italic;">
                    暂无词缀
                </div>
            </div>

            <h2>🎯 当前目标</h2>
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-name">下一波</span>
                    <span class="stat-value" id="nextWave">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-name">剩余敌人</span>
                    <span class="stat-value" id="enemiesLeft">0</span>
                </div>
            </div>

            <h2>📈 升级经验</h2>
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-name">当前经验</span>
                    <span class="stat-value" id="sidebarExp">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-name">所需经验</span>
                    <span class="stat-value" id="sidebarExpNeeded">100</span>
                </div>
                <div class="stat-item">
                    <span class="stat-name">升级公式</span>
                    <span class="stat-value" style="font-size: 10px;">×1.5</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 升级选择界面 -->
    <div id="upgradePanel">
        <h2>🎉 升级！选择一个词缀</h2>
        <div class="upgrade-options" id="upgradeOptions"></div>
    </div>

    <!-- 游戏结束 -->
    <div id="gameOver">
        <h2>游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <p>到达关卡: <span id="finalWave">1</span></p>
        <p>最高等级: <span id="finalLevel">1</span></p>
        <p>获得词缀: <span id="finalAffixes">0</span></p>
        <button id="restartBtn">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let gameRunning = true;
        let paused = false;
        let score = 0;
        let wave = 1;
        let enemiesThisWave = 10;
        let enemiesKilledThisWave = 0;

        // 玩家属性
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 90,
            width: 50,
            height: 60,
            speed: 1,
            damage: 1,
            attackSpeed: 1,
            defense: 1,
            level: 1,
            exp: 0,
            expNeeded: 100,
            lives: 3,
            maxLives: 3
        };

        // 词缀系统
        const affixes = [];

        // 词缀库
        const affixPool = [
            // 普通词缀
            { name: '速度提升', desc: '移动速度 +0.2', rarity: 'common', effect: (p) => p.speed += 0.2 },
            { name: '攻击强化', desc: '攻击力 +0.2', rarity: 'common', effect: (p) => p.damage += 0.2 },
            { name: '快速射击', desc: '攻击速度 +0.2', rarity: 'common', effect: (p) => p.attackSpeed += 0.2 },
            { name: '坚固护甲', desc: '防御力 +0.2', rarity: 'common', effect: (p) => p.defense += 0.2 },
            { name: '生命提升', desc: '最大生命 +1', rarity: 'common', effect: (p) => { p.maxLives += 1; p.lives += 1; } },
            // 稀有词缀
            { name: '疾风步', desc: '移动速度 +0.5', rarity: 'rare', effect: (p) => p.speed += 0.5 },
            { name: '致命打击', desc: '攻击力 +0.5', rarity: 'rare', effect: (p) => p.damage += 0.5 },
            { name: '连射', desc: '攻击速度 +0.5', rarity: 'rare', effect: (p) => p.attackSpeed += 0.5 },
            { name: '铁壁', desc: '防御力 +0.5', rarity: 'rare', effect: (p) => p.defense += 0.5 },
            { name: '多重射击', desc: '子弹数量 +1', rarity: 'rare', effect: (p) => p.multiShot = (p.multiShot || 0) + 1 },
            // 史诗词缀
            { name: '闪电步伐', desc: '移动速度 +1.0', rarity: 'epic', effect: (p) => p.speed += 1.0 },
            { name: '毁灭打击', desc: '攻击力 +1.0', rarity: 'epic', effect: (p) => p.damage += 1.0 },
            { name: '极速射击', desc: '攻击速度 +1.0', rarity: 'epic', effect: (p) => p.attackSpeed += 1.0 },
            { name: '不灭之躯', desc: '防御力 +1.0', rarity: 'epic', effect: (p) => p.defense += 1.0 },
            { name: '穿透', desc: '子弹穿透敌人', rarity: 'epic', effect: (p) => p.piercing = true },
            // 传奇词缀
            { name: '神速', desc: '移动速度 +2.0', rarity: 'legendary', effect: (p) => p.speed += 2.0 },
            { name: '神力', desc: '攻击力 +2.0', rarity: 'legendary', effect: (p) => p.damage += 2.0 },
            { name: '神射', desc: '攻击速度 +2.0', rarity: 'legendary', effect: (p) => p.attackSpeed += 2.0 },
            { name: '神盾', desc: '防御力 +2.0', rarity: 'legendary', effect: (p) => p.defense += 2.0 },
            { name: '分裂', desc: '子弹分裂成3发', rarity: 'legendary', effect: (p) => p.splitShot = true },
        ];

        // 子弹数组
        let bullets = [];

        // 敌机数组
        let enemies = [];

        // 粒子效果
        let particles = [];

        // 背景星星
        let stars = [];

        // 键盘状态
        const keys = {};

        // 初始化背景星星
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 2 + 0.5,
                brightness: Math.random()
            });
        }

        // 绘制背景
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#1a1a3a');
            gradient.addColorStop(1, '#0a0a2a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.brightness += (Math.random() - 0.5) * 0.1;
                star.brightness = Math.max(0.3, Math.min(1, star.brightness));
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        // 绘制玩家
        function drawPlayer() {
            ctx.save();
            ctx.shadowColor = '#87ceeb';
            ctx.shadowBlur = 20;

            const gradient = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.height);
            gradient.addColorStop(0, '#6ab0ff');
            gradient.addColorStop(0.5, '#4a90d9');
            gradient.addColorStop(1, '#2a5a9a');
            ctx.fillStyle = gradient;

            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height * 0.7);
            ctx.lineTo(player.x + player.width * 0.3, player.y + player.height * 0.6);
            ctx.lineTo(player.x + player.width * 0.3, player.y + player.height);
            ctx.lineTo(player.x + player.width * 0.7, player.y + player.height);
            ctx.lineTo(player.x + player.width * 0.7, player.y + player.height * 0.6);
            ctx.lineTo(player.x + player.width, player.y + player.height * 0.7);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#357abd';
            ctx.fillRect(player.x - 8, player.y + 25, 12, 30);
            ctx.fillRect(player.x + player.width - 4, player.y + 25, 12, 30);

            ctx.restore();
        }

        // 绘制子弹
        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.save();
                ctx.shadowColor = bullet.color;
                ctx.shadowBlur = 10;
                ctx.fillStyle = bullet.color;
                ctx.fillRect(bullet.x - 2, bullet.y, 4, bullet.height);
                ctx.restore();
            });
        }

        // 绘制敌机
        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.save();
                ctx.shadowColor = enemy.color;
                ctx.shadowBlur = 15;

                const gradient = ctx.createLinearGradient(enemy.x, enemy.y, enemy.x, enemy.y + enemy.height);
                gradient.addColorStop(0, enemy.color);
                gradient.addColorStop(1, '#8b0000');
                ctx.fillStyle = gradient;

                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
                ctx.lineTo(enemy.x, enemy.y);
                ctx.lineTo(enemy.x + enemy.width * 0.3, enemy.y + enemy.height * 0.3);
                ctx.lineTo(enemy.x + enemy.width * 0.5, enemy.y + enemy.height * 0.2);
                ctx.lineTo(enemy.x + enemy.width * 0.7, enemy.y + enemy.height * 0.3);
                ctx.lineTo(enemy.x + enemy.width, enemy.y);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            });
        }

        // 绘制粒子
        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        // 创建爆炸
        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i;
                const speed = Math.random() * 5 + 3;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 5 + 2,
                    color: color,
                    life: 1
                });
            }
        }

        // 更新粒子
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.98;
                p.vy *= 0.98;
                p.life -= 0.02;
                return p.life > 0;
            });
        }

        // 发射子弹
        function shoot() {
            const bulletCount = 1 + (player.multiShot || 0) + (player.splitShot ? 2 : 0);
            const baseColor = '#ffff00';

            for (let i = 0; i < bulletCount; i++) {
                const offset = (i - (bulletCount - 1) / 2) * 5;
                bullets.push({
                    x: player.x + player.width / 2 - 2 + offset,
                    y: player.y,
                    width: 4,
                    height: 15,
                    color: baseColor,
                    vx: offset * 0.3,
                    damage: player.damage,
                    piercing: player.piercing || false
                });
            }
        }

        // 生成敌机
        function spawnEnemy() {
            const difficultyMultiplier = 1 + (wave - 1) * 0.2;
            const isElite = Math.random() < 0.1 + wave * 0.02;
            const colors = ['#ff6b6b', '#ff8c42', '#ff5252', '#e74c3c', '#c0392b'];

            enemies.push({
                x: Math.random() * (canvas.width - 50),
                y: -50,
                width: isElite ? 50 : 40,
                height: isElite ? 55 : 45,
                speed: (isElite ? 1.5 : Math.random() * 2 + 2.5) * difficultyMultiplier,
                color: colors[Math.floor(Math.random() * colors.length)],
                isElite: isElite,
                health: (isElite ? 3 : 1) * difficultyMultiplier,
                maxHealth: (isElite ? 3 : 1) * difficultyMultiplier,
                damage: 1 * difficultyMultiplier,
                expValue: isElite ? 30 : 10
            });
        }

        // 更新游戏
        function update() {
            if (!gameRunning || paused) return;

            // 玩家移动
            const speedBoost = keys['Shift'] ? 1.5 : 1;
            const moveSpeed = player.speed * speedBoost;
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= moveSpeed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += moveSpeed;
            }

            // 更新子弹
            bullets = bullets.filter(bullet => {
                bullet.y += -12;
                bullet.x += bullet.vx || 0;
                return bullet.y > -20 && bullet.x > -20 && bullet.x < canvas.width + 20;
            });

            // 更新敌机
            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;
                return enemy.y < canvas.height + 50;
            });

            // 碰撞检测：子弹击中敌机
            bullets = bullets.filter(bullet => {
                let hit = false;
                enemies = enemies.filter(enemy => {
                    if (bullet.x < enemy.x + enemy.width &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y + bullet.height > enemy.y) {
                        hit = true;
                        enemy.health -= bullet.damage;

                        if (enemy.health <= 0) {
                            createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color, 20);
                            score += enemy.isElite ? 50 : 10;
                            gainExp(enemy.expValue);
                            enemiesKilledThisWave++;
                            return false;
                        }
                    }
                    return true;
                });
                return !hit || bullet.piercing;
            });

            // 碰撞检测：敌机撞到玩家
            enemies = enemies.filter(enemy => {
                if (enemy.x < player.x + player.width &&
                    enemy.x + enemy.width > player.x &&
                    enemy.y < player.y + player.height &&
                    enemy.y + enemy.height > player.y) {
                    const damage = Math.max(1, Math.ceil(enemy.damage - player.defense * 0.5));
                    player.lives -= damage;
                    createExplosion(player.x + player.width / 2, player.y + player.height / 2, '#4a90d9', 25);
                    if (player.lives <= 0) {
                        gameOver();
                    }
                    return false;
                }
                return true;
            });

            // 检查波次完成
            if (enemiesKilledThisWave >= enemiesThisWave) {
                nextWave();
            }

            updateParticles();
            updateUI();
        }

        // 获得经验
        function gainExp(amount) {
            player.exp += amount;
            while (player.exp >= player.expNeeded) {
                player.exp -= player.expNeeded;
                player.level++;
                player.expNeeded = Math.floor(player.expNeeded * 1.5);
                showUpgradePanel();
            }
        }

        // 下一波
        function nextWave() {
            wave++;
            enemiesThisWave = 10 + wave * 2;
            enemiesKilledThisWave = 0;
            document.getElementById('nextWave').textContent = wave;
        }

        // 显示升级面板
        function showUpgradePanel() {
            paused = true;
            const panel = document.getElementById('upgradePanel');
            const optionsDiv = document.getElementById('upgradeOptions');
            optionsDiv.innerHTML = '';

            // 随机选择3个词缀
            const options = [];
            for (let i = 0; i < 3; i++) {
                const rarityRoll = Math.random();
                let rarity;
                if (rarityRoll < 0.5) rarity = 'common';
                else if (rarityRoll < 0.8) rarity = 'rare';
                else if (rarityRoll < 0.95) rarity = 'epic';
                else rarity = 'legendary';

                const pool = affixPool.filter(a => a.rarity === rarity);
                const affix = pool[Math.floor(Math.random() * pool.length)];
                options.push(affix);
            }

            options.forEach((affix, index) => {
                const div = document.createElement('div');
                div.className = 'upgrade-option';
                div.innerHTML = `
                    <div class="affix-name rarity-${affix.rarity}">${affix.name}</div>
                    <div class="affix-desc">${affix.desc}</div>
                    <div class="affix-rarity rarity-${affix.rarity}">${affix.rarity.toUpperCase()}</div>
                `;
                div.onclick = () => selectUpgrade(affix);
                optionsDiv.appendChild(div);
            });

            panel.style.display = 'block';
        }

        // 选择升级
        function selectUpgrade(affix) {
            affix.effect(player);
            affixes.push(affix);
            updateAffixList();
            document.getElementById('upgradePanel').style.display = 'none';
            paused = false;
        }

        // 更新词缀列表
        function updateAffixList() {
            const list = document.getElementById('affixList');
            if (affixes.length === 0) {
                list.innerHTML = '<div class="affix-item" style="color: #666; font-style: italic;">暂无词缀</div>';
                return;
            }
            list.innerHTML = affixes.map(a => `
                <div class="affix-item">
                    <span class="affix-name rarity-${a.rarity}">${a.name}</span>
                    <span class="affix-value">${a.desc}</span>
                </div>
            `).join('');
        }

        // 更新UI
        function updateUI() {
            document.getElementById('wave').textContent = wave;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = player.lives;
            document.getElementById('level').textContent = player.level;
            document.getElementById('exp').textContent = player.exp;
            document.getElementById('expNeeded').textContent = player.expNeeded;
            document.getElementById('enemiesLeft').textContent = enemiesThisWave - enemiesKilledThisWave;

            // 更新经验条
            const expPercent = (player.exp / player.expNeeded) * 100;
            document.getElementById('expBar').style.width = expPercent + '%';

            // 更新侧边栏经验信息
            document.getElementById('sidebarExp').textContent = player.exp;
            document.getElementById('sidebarExpNeeded').textContent = player.expNeeded;

            document.getElementById('stat-speed').textContent = player.speed.toFixed(1);
            document.getElementById('stat-damage').textContent = player.damage.toFixed(1);
            document.getElementById('stat-attackSpeed').textContent = player.attackSpeed.toFixed(1);
            document.getElementById('stat-defense').textContent = player.defense.toFixed(1);
        }

        // 绘制游戏
        function draw() {
            drawBackground();
            drawParticles();
            drawEnemies();
            drawBullets();
            drawPlayer();
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalWave').textContent = wave;
            document.getElementById('finalLevel').textContent = player.level;
            document.getElementById('finalAffixes').textContent = affixes.length;
            document.getElementById('gameOver').style.display = 'block';
        }

        // 重新开始
        function restart() {
            score = 0;
            wave = 1;
            enemiesThisWave = 10;
            enemiesKilledThisWave = 0;
            player.x = canvas.width / 2 - 25;
            player.speed = 1;
            player.damage = 1;
            player.attackSpeed = 1;
            player.defense = 1;
            player.level = 1;
            player.exp = 0;
            player.expNeeded = 100;
            player.lives = 3;
            player.maxLives = 3;
            player.multiShot = 0;
            player.piercing = false;
            player.splitShot = false;

            affixes.length = 0;
            bullets = [];
            enemies = [];
            particles = [];

            updateAffixList();
            document.getElementById('gameOver').style.display = 'none';
            gameRunning = true;
            paused = false;
        }

        // 游戏循环
        let lastEnemySpawn = 0;
        let lastShot = 0;

        function gameLoop(timestamp) {
            // 生成敌机
            const spawnInterval = Math.max(300, 800 - wave * 30);
            if (timestamp - lastEnemySpawn > spawnInterval && enemies.length < 20) {
                spawnEnemy();
                lastEnemySpawn = timestamp;
            }

            // 自动射击
            const shootInterval = Math.max(50, 200 - player.attackSpeed * 30);
            if (keys[' '] && timestamp - lastShot > shootInterval) {
                shoot();
                lastShot = timestamp;
            }

            update();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // 事件监听
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
            if (e.key === 'p' || e.key === 'P') paused = !paused;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        document.getElementById('restartBtn').addEventListener('click', restart);

        // 开始游戏
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
